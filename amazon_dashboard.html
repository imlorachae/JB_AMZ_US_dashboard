<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JungBeauty Amazon Dashboard</title>
<link rel="stylesheet" href="amazon_dashboard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:12px">...</p></div>

<!-- UPLOAD -->
<div id="upload-screen" style="display:none">
  <div class="upload-logo">📊</div>
  <div class="upload-title">JungBeauty Amazon Dashboard</div>
  <div class="upload-sub" id="upl-sub">Google Drive에서 최신 데이터를 가져오거나 파일을 직접 업로드하세요</div>

  <!-- Primary: Drive Sync -->
  <button class="preloaded-btn" onclick="syncFromDriveAndShow()" id="upl-btn"
    style="background:var(--accent);font-size:16px;padding:14px 36px;margin-bottom:8px">
    ☁️ Drive에서 동기화
  </button>
  <p style="font-size:12px;color:var(--muted);margin-bottom:24px" id="storage-status"></p>

  <!-- Secondary: local file upload -->
  <div class="divider" id="upl-div">또는 파일 직접 업로드</div>
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="dz-icon">📁</div>
    <h3 id="upl-h3">파일을 드래그하거나 클릭해서 업로드</h3>
    <p id="upl-p">Business Report CSV · Sponsored Products xlsx</p>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls,.csv" multiple>

  <!-- Utility -->
  <div style="margin-top:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
    <button class="mini-btn ghost" onclick="loadPreloaded()">기본 데이터로 보기</button>
    <button class="mini-btn ghost" onclick="if(confirm('저장된 데이터를 초기화할까요?')){clearStorage();alert('완료')}">🗑 초기화</button>
  </div>
  <input type="file" id="backup-input" accept=".json" style="display:none" onchange="importBackupFile(this.files[0])">
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">📊 JungBeauty Amazon</span>
      <span class="topbar-badge" id="topbar-badge">-</span>
      <span id="link-status" style="font-size:11px;color:var(--muted);margin-left:6px;white-space:nowrap"></span>
    </div>
    <div class="topbar-right">
      <div class="mode-toggle" id="mode-toggle"></div>
      <div class="tab-group" id="tab-group"></div>
      <div class="currency-group">
        <button class="ct-btn" id="vine-inc" onclick="setVineMode('include')">Vine 포함</button>
        <button class="ct-btn active" id="vine-exc" onclick="setVineMode('exclude')">Vine 제외</button>
      </div>
      <div class="currency-group">
        <button class="cur-btn active" onclick="setCurrency('USD',this)">USD</button>
        <button class="cur-btn" onclick="setCurrency('SGD',this)">SGD</button>
        <button class="cur-btn" onclick="setCurrency('KRW',this)">KRW</button>
      </div>
      <button class="icon-btn" id="drive-sync-btn" onclick="syncFromDrive()">동기화</button>
      <button class="icon-btn" id="reset-btn" onclick="resetDashboard()"></button>
    </div>
  </div>

  <div class="content">
    <!-- NAVBAR (item 1 + 6) -->
    <div class="navbar">
      <div class="navbar-left">
        <div class="year-tabs" id="year-tabs"></div>
        <div class="unit-tabs" id="unit-tabs"></div>
      </div>
      <div class="navbar-right">
        <label id="rng-lbl">기간</label>
        <input type="date" id="rng-from" style="background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;outline:none;cursor:pointer">
        <span style="color:var(--muted);font-size:11px">~</span>
        <input type="date" id="rng-to" style="background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;outline:none;cursor:pointer">
        <button class="mini-btn" id="rng-apply" onclick="applyRange()">적용</button>
        <button class="mini-btn ghost" id="rng-reset" onclick="resetRange()">초기화</button>
      </div>
    </div>

    <div id="week-nav-bar" style="display:none"></div>
    <div id="review-section"></div>
    <div id="top-banner"></div>
    <div class="kpi-grid5" id="kpi-row1"></div>
    <div class="ratio-grid" id="ratio-grid"></div>

    <div class="charts-grid" id="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title" id="chart-main-title"></div>
          <div class="chart-type-toggle">
            <button class="ct-btn active" id="ct-bar" onclick="setChartType('bar')"></button>
            <button class="ct-btn" id="ct-line" onclick="setChartType('line')"></button>
            <button class="ct-btn" id="ct-mix" onclick="setChartType('mix')"></button>
          </div>
        </div>
        <div id="mainChart-wrap" style="position:relative;height:360px"><canvas id="mainChart"></canvas></div>
      </div>
      <div class="chart-card" id="donut-card">
        <div class="chart-header"><div class="chart-title" id="donut-title"></div></div>
        <div style="position:relative;height:320px"><canvas id="donutChart"></canvas></div>
      </div>
    </div>

    <div id="summary-section"></div>
    <div id="daily-section" style="display:none"></div>
    <div id="overview-section" style="display:none"></div>
    <div id="settings-section" style="display:none"></div>
  </div>
  </div>
</div>
<script src="amazon_dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JungBeauty Store Dashboard — Amazon US</title>
<link rel="stylesheet" href="amazon_dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
/* store-specific overrides — 공용 디자인은 amazon_dashboard.css 사용 */
#dashboard{display:flex}
.chart-wrap{position:relative;height:220px}
.kpi-chg{min-height:14px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ratio-card .ratio-val{font-size:17px}

/* SOURCE */
.source-rows{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.source-row{display:flex;align-items:center;gap:8px}
.src-name{width:72px;color:var(--muted);font-size:12px;flex-shrink:0;font-weight:500}
.src-bar-bg{flex:1;background:var(--card2);border-radius:4px;height:8px;overflow:hidden}
.src-bar{height:100%;border-radius:4px;transition:width .4s}
.src-visits{width:36px;text-align:right;font-size:12px;color:var(--text);font-weight:600}
.src-sales{width:70px;text-align:right;font-size:11px;color:var(--accent);font-weight:600}

/* BOTTOM GRID */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.section-header{background:var(--card2);padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.row-hl td{background:rgba(29,78,216,.06)!important;font-weight:700}
.no-data{padding:20px;text-align:center;color:var(--muted);font-size:12px}

@media(max-width:900px){
  .sidebar-section-lbl{display:none}
  .sidebar-country,.sidebar-channel,.sidebar-mode{width:auto;white-space:nowrap;padding:8px 10px}
}
@media(max-width:700px){
  .bottom-grid{grid-template-columns:1fr}
  .section-card{overflow-x:auto}
}
</style>
</head>
<body>

<div id="dashboard">
  <div class="sidebar">
    <div class="sidebar-logo">📊 JungBeauty</div>
    <button class="sidebar-btn" onclick="location.href='amazon_dashboard.html'"><span class="ic">🌍</span><span>오버뷰</span></button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-lbl">국가 · 채널</div>
    <button class="sidebar-country active expanded"><span>🇺🇸</span><span class="sc-name">US</span><span class="sc-arrow">▾</span></button>
    <button class="sidebar-channel active">Amazon</button>
    <button class="sidebar-mode" onclick="location.href='amazon_dashboard.html'">💰 <span>매출</span></button>
    <button class="sidebar-mode" onclick="location.href='amazon_dashboard.html'">📢 <span>광고</span></button>
    <button class="sidebar-mode active">🛍 <span>스토어</span></button>
    <div class="sidebar-divider"></div>
    <button class="sidebar-btn" onclick="location.href='amazon_dashboard.html'"><span class="ic">⚙️</span><span>설정</span></button>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-foot">🇺🇸 US · Amazon</div>
  </div>
  <div class="main-area">

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🛍 JungBeauty Store</span>
      <span class="topbar-badge">Amazon US</span>
    </div>
    <div class="topbar-right">
      <div class="tab-group">
        <button class="tab-btn active" onclick="setMonth('all')">전체</button>
        <button class="tab-btn" onclick="setMonth('2026-03')">3월</button>
        <button class="tab-btn" onclick="setMonth('2026-04')">4월</button>
        <button class="tab-btn" onclick="setMonth('2026-05')">5월</button>
      </div>
    </div>
  </div>

  <div id="status-bar">데이터 기간: 2026.03.12 ~ 2026.05.31 · Amazon Brand Store 인사이트</div>

  <div class="content">
    <div class="banner-projected" id="banner">
      <div>
        <div class="banner-label">스토어 총 매출</div>
        <div class="banner-value" id="banner-val"></div>
        <div class="banner-meta" id="banner-meta"></div>
      </div>
      <div class="banner-right">
        <div class="banner-month" id="banner-tag"></div>
        <div class="banner-days" id="banner-sub"></div>
      </div>
    </div>

    <div class="kpi-grid5" id="kpi-grid"></div>

    <div class="ratio-grid" id="insight-row"></div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">일별 매출 &amp; 방문자</div>
        </div>
        <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">트래픽 소스별 방문</div>
        </div>
        <div class="source-rows" id="source-rows"></div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="section-card">
        <div class="section-header">📄 스토어 페이지별 성과</div>
        <div id="livepage-area"></div>
      </div>
      <div class="section-card">
        <div class="section-header">📊 월별 비교</div>
        <table>
          <thead>
            <tr>
              <th>월</th><th>매출</th><th>주문</th><th>방문자</th><th>조회수</th><th>CVR</th>
            </tr>
          </thead>
          <tbody id="comp-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// [date, views, visitors, sales, orders, units, newVisitors]
const DAILY = [
  ['2026-03-12',11,5,0,0,0,5],['2026-03-13',5,3,0,0,0,3],
  ['2026-03-14',3,2,0,0,0,1],['2026-03-15',1,1,0,0,0,1],
  ['2026-03-16',14,12,260,4,4,11],['2026-03-17',2,2,0,0,0,0],
  ['2026-03-18',3,3,0,0,0,1],['2026-03-19',3,3,0,0,0,3],
  ['2026-03-21',3,2,0,0,0,2],['2026-03-22',10,8,0,0,0,4],
  ['2026-03-23',5,4,0,0,0,1],['2026-03-24',14,9,0,0,0,4],
  ['2026-03-25',6,5,0,0,0,4],['2026-03-26',6,5,0,0,0,2],
  ['2026-03-27',4,4,0,0,0,2],['2026-03-28',12,9,0,0,0,6],
  ['2026-03-29',9,7,117,1,2,4],['2026-03-30',6,4,0,0,0,1],
  ['2026-03-31',11,8,0,0,0,4],
  ['2026-04-01',1,1,0,0,0,0],['2026-04-02',1,1,0,0,0,1],
  ['2026-04-03',2,2,0,0,0,2],['2026-04-04',4,2,0,0,0,2],
  ['2026-04-05',7,4,0,0,0,2],['2026-04-06',2,2,0,0,0,1],
  ['2026-04-08',1,1,0,0,0,1],['2026-04-09',5,4,0,0,0,3],
  ['2026-04-11',3,2,0,0,0,2],['2026-04-12',3,2,0,0,0,1],
  ['2026-04-13',11,10,0,0,0,4],['2026-04-14',10,7,65,1,1,4],
  ['2026-04-15',7,6,0,0,0,4],['2026-04-16',6,4,0,0,0,4],
  ['2026-04-17',7,5,0,0,0,3],['2026-04-18',4,2,0,0,0,2],
  ['2026-04-19',16,2,0,0,0,0],['2026-04-20',6,4,39,1,1,3],
  ['2026-04-21',4,2,0,0,0,1],['2026-04-22',10,5,0,0,0,2],
  ['2026-04-23',15,8,0,0,0,5],['2026-04-24',5,4,0,0,0,2],
  ['2026-04-25',5,4,0,0,0,3],['2026-04-26',8,5,65,1,1,5],
  ['2026-04-27',4,2,0,0,0,0],['2026-04-28',3,2,0,0,0,2],
  ['2026-04-29',6,3,0,0,0,2],['2026-04-30',10,4,0,0,0,1],
  ['2026-05-01',3,3,0,0,0,1],['2026-05-02',6,4,0,0,0,2],
  ['2026-05-03',12,5,65,1,1,3],['2026-05-04',15,7,35,1,1,3],
  ['2026-05-05',6,4,65,1,1,3],['2026-05-06',7,3,0,0,0,2],
  ['2026-05-07',17,5,0,0,0,3],['2026-05-08',4,3,0,0,0,3],
  ['2026-05-09',5,3,0,0,0,2],['2026-05-10',4,2,0,0,0,1],
  ['2026-05-11',5,5,0,0,0,1],['2026-05-12',7,5,0,0,0,4],
  ['2026-05-13',3,2,0,0,0,2],['2026-05-14',3,2,0,0,0,1],
  ['2026-05-15',19,13,0,0,0,9],['2026-05-16',4,2,0,0,0,2],
  ['2026-05-17',8,4,54.79,1,1,3],['2026-05-18',5,4,54.79,1,1,3],
  ['2026-05-19',8,5,194.79,2,3,4],['2026-05-20',24,13,0,0,0,11],
  ['2026-05-21',11,6,0,0,0,5],['2026-05-22',2,2,0,0,0,2],
  ['2026-05-23',7,5,0,0,0,3],['2026-05-24',2,2,0,0,0,2],
  ['2026-05-25',1,1,0,0,0,0],['2026-05-26',2,2,0,0,0,1],
  ['2026-05-27',8,5,0,0,0,4],['2026-05-28',10,6,0,0,0,4],
  ['2026-05-29',10,7,54.79,1,1,4],['2026-05-30',3,2,0,0,0,2],
  ['2026-05-31',3,2,0,0,0,2],
];

// Traffic sources: [name, visits, sales]
const SOURCES = {
  all:    [['바이라인',370,1070.16],['기타',73,0],['Instagram',27,0],['YouTube',14,0],['Bing',3,0],['광고',0,0]],
  '2026-03': [['바이라인',85,377],['기타',19,0],['Instagram',11,0]],
  '2026-04': [['바이라인',115,169],['기타',23,0],['Instagram',9,0],['YouTube',4,0],['Bing',3,0]],
  '2026-05': [['바이라인',170,524.16],['기타',31,0],['Instagram',7,0],['YouTube',10,0]],
};

// Live page data: [page, views, visits, sales, orders, units]
const LIVE_PAGES = {
  all:    [['홈',420,394,755.58,12,13],['All product',47,43,194.79,2,3],['Skin care',37,36,119.79,2,2],['Hair care',14,14,0,0,0]],
  '2026-04': [['홈',125,116,169,3,3],['All product',21,18,0,0,0],['Skin care',12,12,0,0,0],['Hair care',8,8,0,0,0]],
};

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt$  = v => '$' + v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI  = v => v.toLocaleString('en');
const fmtP  = (v,d=1) => (v*100).toFixed(d)+'%';
const getRows = mo => mo==='all' ? DAILY : DAILY.filter(r=>r[0].startsWith(mo));

function agg(rows){
  return rows.reduce((a,r)=>({
    views:a.views+r[1],visitors:a.visitors+r[2],
    sales:a.sales+r[3],orders:a.orders+r[4],
    units:a.units+r[5],newV:a.newV+r[6]
  }),{views:0,visitors:0,sales:0,orders:0,units:0,newV:0});
}

const PREV = {'2026-04':'2026-03','2026-05':'2026-04'};
function delta(a,b){ return b&&b!==0?(a-b)/b:null; }
function dHtml(d){
  if(d===null)return '<span class="neutral">—</span>';
  const cls = d>=0?'up':'down';
  return `<span class="${cls}">${d>=0?'+':''}${(d*100).toFixed(0)}%</span>`;
}
function badge(d){
  if(d===null)return '';
  return d>=0?`<span class="badge badge-up">▲ ${(d*100).toFixed(0)}%</span>`:`<span class="badge badge-down">▼ ${Math.abs(d*100).toFixed(0)}%</span>`;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let curMo = 'all';
let chart = null;

// ── RENDER ───────────────────────────────────────────────────────────────────
function setMonth(mo){
  curMo = mo;
  document.querySelectorAll('.tab-btn').forEach(t=>{
    t.classList.toggle('active',
      (mo==='all'&&t.textContent==='전체')||
      (mo==='2026-03'&&t.textContent==='3월')||
      (mo==='2026-04'&&t.textContent==='4월')||
      (mo==='2026-05'&&t.textContent==='5월')
    );
  });
  render();
}

function render(){
  const rows = getRows(curMo);
  const a    = agg(rows);
  const prev = PREV[curMo]||null;
  const pa   = prev ? agg(getRows(prev)) : null;
  const cvr  = a.visitors>0 ? a.orders/a.visitors : 0;
  const pcvr = pa&&pa.visitors>0 ? pa.orders/pa.visitors : null;
  const newRate = a.visitors>0 ? a.newV/a.visitors : 0;

  // Banner
  const mName = {all:'2026년 3~5월 전체',
    '2026-03':'2026년 3월','2026-04':'2026년 4월','2026-05':'2026년 5월'}[curMo];
  document.getElementById('banner-val').textContent = fmt$(a.sales);
  document.getElementById('banner-meta').textContent =
    `${a.orders}주문 · ${a.units}단품 · AOV ${a.orders>0?fmt$(a.sales/a.orders):'-'}`;
  document.getElementById('banner-tag').textContent = mName;
  document.getElementById('banner-sub').textContent =
    `방문자 ${fmtI(a.visitors)}명 · CVR ${fmtP(cvr)}`;

  // KPI — 세일즈 대시보드와 동일한 5칸 그리드, 값 색상 통일
  const kpis=[
    {l:'매출',      v:fmt$(a.sales),     d:delta(a.sales,pa?.sales),    s:`${a.units} units`},
    {l:'주문',      v:fmtI(a.orders),    d:delta(a.orders,pa?.orders),  s:`AOV ${a.orders>0?fmt$(a.sales/a.orders):'-'}`},
    {l:'방문자',    v:fmtI(a.visitors),  d:delta(a.visitors,pa?.visitors),s:`신규 ${fmtI(a.newV)}명 (${fmtP(newRate,0)})`},
    {l:'조회수',    v:fmtI(a.views),     d:delta(a.views,pa?.views),    s:`인당 ${a.visitors>0?(a.views/a.visitors).toFixed(1):'-'}페이지`},
    {l:'전환율 CVR',v:fmtP(cvr),         d:delta(cvr,pcvr),             s:`${a.orders}주문 / ${a.visitors}명`},
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k=>`
    <div class="kpi-card">
      <div class="kpi-lbl">${k.l}</div>
      <div class="kpi-val">${k.v}</div>
      <div class="kpi-chg">${dHtml(k.d)} ${k.d!==null?'<span style="color:var(--muted);font-size:10px">MoM</span>':''}</div>
      <div class="kpi-sub">${k.s}</div>
    </div>`).join('');

  // Insights — ratio-card 스타일 (세일즈 대시보드 비율 카드와 동일)
  const bestSales = rows.reduce((b,r)=>r[3]>(b?b[3]:0)?r:b, null);
  const bestVis   = rows.reduce((b,r)=>r[2]>(b?b[2]:0)?r:b, null);
  const salesDays = rows.filter(r=>r[3]>0).length;
  const ins = [
    {l:'최고 매출일', v: bestSales&&bestSales[3]>0?`${bestSales[0].slice(5)} · ${fmt$(bestSales[3])}`:'—', d: bestSales&&bestSales[3]>0?`${bestSales[4]}주문 / 방문자 ${bestSales[2]}명`:''},
    {l:'최다 방문일', v: bestVis?`${bestVis[0].slice(5)} · ${bestVis[2]}명`:'—', d: bestVis?`조회수 ${bestVis[1]} / 매출 ${bestVis[3]>0?fmt$(bestVis[3]):'$0'}`:''},
    {l:'매출 발생일', v:`${salesDays}일 / ${rows.length}일`, d:`${(salesDays/rows.length*100).toFixed(1)}% 일 전환율`},
    {l:'신규 방문율', v:fmtP(newRate), d:`신규 ${fmtI(a.newV)}명 / ${fmtI(a.visitors)}명`},
    {l:'홈 페이지 기여율', v: curMo==='all'?'70.6%': curMo==='2026-04'?'100%':'—', d: curMo==='all'?'$755.58 / $1,070.16':curMo==='2026-04'?'$169 / $169':'-'},
  ];
  document.getElementById('insight-row').innerHTML = ins.map(i=>`
    <div class="ratio-card">
      <div class="ratio-lbl">${i.l}</div>
      <div class="ratio-val">${i.v}</div>
      <div class="ratio-sub">${i.d}</div>
    </div>`).join('');

  // Daily chart
  const ctx = document.getElementById('dailyChart').getContext('2d');
  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: rows.map(r=>r[0].slice(5)),
      datasets:[
        {label:'매출($)',data:rows.map(r=>r[3]),backgroundColor:'rgba(29,78,216,.25)',borderColor:'#1d4ed8',borderWidth:1.5,yAxisID:'y'},
        {label:'방문자',data:rows.map(r=>r[2]),type:'line',borderColor:'#0891b2',backgroundColor:'transparent',borderWidth:2,pointRadius:rows.length>40?0:2.5,yAxisID:'y1',tension:.3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#64748b',font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label==='매출($)'?`매출: $${c.raw.toFixed(2)}`:`방문자: ${c.raw}명`}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:9},maxTicksLimit:18},grid:{color:'rgba(0,0,0,.04)'}},
        y:{ticks:{color:'#1d4ed8',font:{size:10},callback:v=>'$'+v},grid:{color:'rgba(0,0,0,.04)'},position:'left'},
        y1:{ticks:{color:'#0891b2',font:{size:10}},grid:{display:false},position:'right'},
      }
    }
  });

  // Source
  const src = SOURCES[curMo]||SOURCES.all;
  const maxV = Math.max(...src.map(s=>s[1]),1);
  const srcColors = ['#1d4ed8','#94a3b8','#e1306c','#ff0000','#3b82f6','#64748b'];
  document.getElementById('source-rows').innerHTML = src.map((s,i)=>`
    <div class="source-row">
      <div class="src-name">${s[0]}</div>
      <div class="src-bar-bg"><div class="src-bar" style="width:${(s[1]/maxV*100).toFixed(1)}%;background:${srcColors[i]}"></div></div>
      <div class="src-visits">${s[1]}</div>
      <div class="src-sales">${s[2]>0?fmt$(s[2]):''}</div>
    </div>`).join('');

  // LivePage table
  const pages = LIVE_PAGES[curMo]||LIVE_PAGES['all'];
  const hasPages = pages && pages.some(p=>p[2]>0);
  const totalPageVisits = pages.reduce((s,p)=>s+p[2],0);
  let lpHtml;
  if(!hasPages && curMo!=='all' && curMo!=='2026-04'){
    lpHtml = `<div class="no-data">월별 페이지 데이터 없음 (전체 기간 탭에서 확인)</div>`;
  } else {
    lpHtml = `<table>
      <thead><tr>
        <th>페이지</th><th>조회수</th><th>방문</th><th>비율</th><th>매출</th><th>주문</th><th>CVR</th>
      </tr></thead>
      <tbody>
      ${pages.map(p=>{
        const cvr2 = p[2]>0?p[4]/p[2]:0;
        const pct  = totalPageVisits>0?p[2]/totalPageVisits:0;
        return `<tr ${p[3]>0?'class="row-hl"':''}>
          <td>${p[0]}</td>
          <td>${fmtI(p[1])}</td>
          <td>${fmtI(p[2])}</td>
          <td><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
            <div style="width:40px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden">
              <div style="width:${(pct*100).toFixed(1)}%;height:100%;background:#1d4ed8;border-radius:3px"></div>
            </div>
            <span>${fmtP(pct,0)}</span>
          </div></td>
          <td style="color:${p[3]>0?'#1d4ed8':'#94a3b8'};font-weight:${p[3]>0?700:400}">${p[3]>0?fmt$(p[3]):'—'}</td>
          <td>${p[4]>0?p[4]:'—'}</td>
          <td>${p[2]>0?fmtP(cvr2):'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
  }
  document.getElementById('livepage-area').innerHTML = lpHtml;

  // Comparison table
  const mos = ['2026-03','2026-04','2026-05'];
  const mLabels = {'2026-03':'3월','2026-04':'4월','2026-05':'5월'};
  document.getElementById('comp-tbody').innerHTML = mos.map(mo=>{
    const d   = agg(getRows(mo));
    const pd  = agg(getRows(PREV[mo]||'__'));
    const cvr2= d.visitors>0?(d.orders/d.visitors*100).toFixed(1)+'%':'—';
    const hl  = curMo===mo?'row-hl':'';
    const dlt = curMo===mo&&PREV[mo]?badge(delta(d.sales,pd.sales)):'';
    return `<tr class="${hl}">
      <td>${mLabels[mo]}</td>
      <td>${fmt$(d.sales)} ${dlt}</td>
      <td>${d.orders}</td>
      <td>${d.visitors}</td>
      <td>${d.views}</td>
      <td>${cvr2}</td>
    </tr>`;
  }).join('');
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JungBeauty Store Dashboard — Amazon US</title>
<link rel="stylesheet" href="amazon_dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
/* store-specific overrides — 공용 디자인은 amazon_dashboard.css 사용 */
#dashboard{display:flex}
.chart-wrap{position:relative;height:220px}
.kpi-chg{min-height:14px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ratio-card .ratio-val{font-size:17px}

/* SOURCE */
.source-rows{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.source-row{display:flex;align-items:center;gap:8px}
.src-name{width:72px;color:var(--muted);font-size:12px;flex-shrink:0;font-weight:500}
.src-bar-bg{flex:1;background:var(--card2);border-radius:4px;height:8px;overflow:hidden}
.src-bar{height:100%;border-radius:4px;transition:width .4s}
.src-visits{width:36px;text-align:right;font-size:12px;color:var(--text);font-weight:600}
.src-sales{width:70px;text-align:right;font-size:11px;color:var(--accent);font-weight:600}

/* BOTTOM GRID */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.section-header{background:var(--card2);padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.row-hl td{background:rgba(29,78,216,.06)!important;font-weight:700}
.no-data{padding:20px;text-align:center;color:var(--muted);font-size:12px}

@media(max-width:900px){
  .sidebar-section-lbl{display:none}
  .sidebar-country,.sidebar-channel,.sidebar-mode{width:auto;white-space:nowrap;padding:8px 10px}
}
@media(max-width:700px){
  .bottom-grid{grid-template-columns:1fr}
  .section-card{overflow-x:auto}
}
</style>
</head>
<body>

<div id="dashboard">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🛍 JungBeauty Store</span>
      <span class="topbar-badge">Amazon US</span>
    </div>
    <div class="topbar-right"></div>
  </div>

  <div id="status-bar"></div>

  <div class="content">
    <!-- NAVBAR — 날짜·기간 선택은 데이터 영역 상단에 배치 (규칙 7-6) -->
    <div class="navbar">
      <div class="navbar-left">
        <div class="year-tabs"><button class="year-tab active">2026</button></div>
        <div class="unit-tabs" id="unit-tabs"></div>
      </div>
      <div class="navbar-right">
        <label id="rng-lbl"></label>
        <input type="date" id="rng-from" min="2026-03-12" max="2026-05-31">
        <span style="color:var(--muted);font-size:11px">~</span>
        <input type="date" id="rng-to" min="2026-03-12" max="2026-05-31">
        <button class="mini-btn" id="rng-apply" onclick="applyRange()"></button>
        <button class="mini-btn ghost" id="rng-reset" onclick="setMonth('all')"></button>
      </div>
    </div>

    <div class="banner-projected" id="banner">
      <div>
        <div class="banner-label" id="banner-lbl"></div>
        <div class="banner-value" id="banner-val"></div>
        <div class="banner-meta" id="banner-meta"></div>
      </div>
      <div class="banner-right">
        <div class="banner-month" id="banner-tag"></div>
        <div class="banner-days" id="banner-sub"></div>
      </div>
    </div>

    <div class="kpi-grid5" id="kpi-grid"></div>

    <div class="ratio-grid" id="insight-row"></div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title" id="chart-title-daily"></div>
        </div>
        <div class="chart-wrap"><canvas id="dailyChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title" id="chart-title-src"></div>
        </div>
        <div class="source-rows" id="source-rows"></div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="section-card">
        <div class="section-header" id="sec-pages"></div>
        <div id="livepage-area"></div>
      </div>
      <div class="section-card">
        <div class="section-header" id="sec-comp"></div>
        <table>
          <thead><tr id="comp-head"></tr></thead>
          <tbody id="comp-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  </div>
</div>

// ── I18N — 세일즈 대시보드와 동일 규칙: 통화 KRW=한글, 그 외 영어 (jb_currency 공유) ──

  iBestSale:'최고 매출일',iBestVis:'최다 방문일',iSaleDays:'매출 발생일',iNewRate:'신규 방문율',iHomeShare:'홈 페이지 기여율',
  dBestSale:(o,v)=>`${o}주문 / 방문자 ${v}명`,vBestVis:n=>`${n}명`,dBestVis:(vw,s)=>`조회수 ${vw} / 매출 ${s}`,
  vSaleDays:(d,t)=>`${d}일 / ${t}일`,dSaleDays:p=>`${p}% 일 전환율`,dNewRate:(n,v)=>`신규 ${n}명 / ${v}명`,

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt$  = v => '$' + v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI  = v => v.toLocaleString('en');
const fmtP  = (v,d=1) => (v*100).toFixed(d)+'%';
function getRows(){
  if(curMo==='range') return DAILY.filter(r=>r[0]>=rangeFrom&&r[0]<=rangeTo);
  return curMo==='all' ? DAILY : DAILY.filter(r=>r[0].startsWith(curMo));
}
const getRowsOf = mo => mo==='all' ? DAILY : DAILY.filter(r=>r[0].startsWith(mo));

function agg(rows){
  return rows.reduce((a,r)=>({
    views:a.views+r[1],visitors:a.visitors+r[2],
    sales:a.sales+r[3],orders:a.orders+r[4],
    units:a.units+r[5],newV:a.newV+r[6]
  }),{views:0,visitors:0,sales:0,orders:0,units:0,newV:0});
}

const PREV = {'2026-04':'2026-03','2026-05':'2026-04'};
function delta(a,b){ return b&&b!==0?(a-b)/b:null; }
function dHtml(d){
  if(d===null)return '<span class="neutral">—</span>';
  const cls = d>=0?'up':'down';
  return `<span class="${cls}">${d>=0?'+':''}${(d*100).toFixed(0)}%</span>`;
}
function badge(d){
  if(d===null)return '';
  return d>=0?`<span class="badge badge-up">▲ ${(d*100).toFixed(0)}%</span>`:`<span class="badge badge-down">▼ ${Math.abs(d*100).toFixed(0)}%</span>`;
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
const MO_BOUNDS={all:['2026-03-12','2026-05-31'],'2026-03':['2026-03-12','2026-03-31'],'2026-04':['2026-04-01','2026-04-30'],'2026-05':['2026-05-01','2026-05-31']};
function setMonth(mo){
  curMo=mo;
  [rangeFrom,rangeTo]=MO_BOUNDS[mo];
  document.getElementById('rng-from').value=rangeFrom;
  document.getElementById('rng-to').value=rangeTo;
  document.querySelectorAll('.unit-tab').forEach(t=>t.classList.toggle('active',t.dataset.mo===mo));
  render();
}
function applyRange(){
  const f=document.getElementById('rng-from').value, t=document.getElementById('rng-to').value;
  if(!f||!t||f>t) return;
  rangeFrom=f; rangeTo=t; curMo='range';
  document.querySelectorAll('.unit-tab').forEach(t2=>t2.classList.remove('active'));
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const rows = getRows();
  const a    = agg(rows);
  const prev = PREV[curMo]||null;
  const pa   = prev ? agg(getRowsOf(prev)) : null;
  const cvr  = a.visitors>0 ? a.orders/a.visitors : 0;
  const pcvr = pa&&pa.visitors>0 ? pa.orders/pa.visitors : null;
  const newRate = a.visitors>0 ? a.newV/a.visitors : 0;

  // Banner
  const mName = curMo==='range' ? `${rangeFrom.replace(/-/g,'.')} ~ ${rangeTo.replace(/-/g,'.')}` : L.mNames[curMo];
  document.getElementById('banner-val').textContent = fmt$(a.sales);
  document.getElementById('banner-meta').textContent =
    L.bannerMeta(a.orders, a.units, a.orders>0?fmt$(a.sales/a.orders):'-');
  document.getElementById('banner-tag').textContent = mName;
  document.getElementById('banner-sub').textContent = L.bannerSub(fmtI(a.visitors), fmtP(cvr));

  // KPI — 세일즈 대시보드와 동일한 5칸 그리드
  const kpis=[
    {l:L.kSales,   v:fmt$(a.sales),    d:delta(a.sales,pa?.sales),      s:L.sUnits(a.units)},
    {l:L.kOrders,  v:fmtI(a.orders),   d:delta(a.orders,pa?.orders),    s:L.sAov(a.orders>0?fmt$(a.sales/a.orders):'-')},
    {l:L.kVisitors,v:fmtI(a.visitors), d:delta(a.visitors,pa?.visitors),s:L.sNew(fmtI(a.newV),fmtP(newRate,0))},
    {l:L.kViews,   v:fmtI(a.views),    d:delta(a.views,pa?.views),      s:L.sPerV(a.visitors>0?(a.views/a.visitors).toFixed(1):'-')},
    {l:L.kCvr,     v:fmtP(cvr),        d:delta(cvr,pcvr),               s:L.sOrdV(a.orders,a.visitors)},
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k=>`
    <div class="kpi-card">
      <div class="kpi-lbl">${k.l}</div>
      <div class="kpi-val">${k.v}</div>
      <div class="kpi-chg">${dHtml(k.d)} ${k.d!==null?'<span style="color:var(--muted);font-size:10px">MoM</span>':''}</div>
      <div class="kpi-sub">${k.s}</div>
    </div>`).join('');

  // Insights — ratio-card 스타일
  const bestSales = rows.reduce((b,r)=>r[3]>(b?b[3]:0)?r:b, null);
  const bestVis   = rows.reduce((b,r)=>r[2]>(b?b[2]:0)?r:b, null);
  const salesDays = rows.filter(r=>r[3]>0).length;
  const ins = [
    {l:L.iBestSale, v: bestSales&&bestSales[3]>0?`${bestSales[0].slice(5)} · ${fmt$(bestSales[3])}`:'—', d: bestSales&&bestSales[3]>0?L.dBestSale(bestSales[4],bestSales[2]):''},
    {l:L.iBestVis,  v: bestVis?`${bestVis[0].slice(5)} · ${L.vBestVis(bestVis[2])}`:'—', d: bestVis?L.dBestVis(bestVis[1],bestVis[3]>0?fmt$(bestVis[3]):'$0'):''},
    {l:L.iSaleDays, v: L.vSaleDays(salesDays,rows.length), d: L.dSaleDays(rows.length>0?(salesDays/rows.length*100).toFixed(1):'0')},
    {l:L.iNewRate,  v: fmtP(newRate), d: L.dNewRate(fmtI(a.newV),fmtI(a.visitors))},
    {l:L.iHomeShare,v: curMo==='all'?'70.6%': curMo==='2026-04'?'100%':'—', d: curMo==='all'?'$755.58 / $1,070.16':curMo==='2026-04'?'$169 / $169':'-'},
  ];
  document.getElementById('insight-row').innerHTML = ins.map(i=>`
    <div class="ratio-card">
      <div class="ratio-lbl">${i.l}</div>
      <div class="ratio-val">${i.v}</div>
      <div class="ratio-sub">${i.d}</div>
    </div>`).join('');

  // Daily chart — US 세일즈 차트와 동일 팔레트(#3b82f6 bar, #22c55e line, 흰 툴팁)
  const ctx = document.getElementById('dailyChart').getContext('2d');
  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    data:{
      labels: rows.map(r=>r[0].slice(5)),
      datasets:[
        {type:'bar',label:L.dsSales,data:rows.map(r=>r[3]),backgroundColor:'rgba(59,130,246,.75)',borderRadius:4,yAxisID:'y',order:2},
        {type:'line',label:L.dsVisitors,data:rows.map(r=>r[2]),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.08)',borderWidth:2,pointRadius:rows.length>40?0:3,tension:.4,fill:false,yAxisID:'y1',order:1},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#475569',boxWidth:10,font:{size:11}}},
        tooltip:{backgroundColor:'#fff',borderColor:'#e2e8f0',borderWidth:1,titleColor:'#0f172a',bodyColor:'#334155',padding:10,
          callbacks:{label:c=>c.dataset.type==='bar'?(' '+L.ttSales(c.raw.toFixed(2))):(' '+L.ttVis(c.raw))}}
      },
      scales:{
        x:{ticks:{color:'#64748b',font:{size:9},maxTicksLimit:18,maxRotation:45},grid:{color:'#f1f5f9'}},
        y:{position:'left',title:{display:true,text:L.kSales,color:'#94a3b8',font:{size:10}},
          ticks:{color:'#3b82f6',font:{size:10},callback:v=>'$'+v},grid:{color:'#e2e8f0'}},
        y1:{position:'right',title:{display:true,text:L.dsVisitors,color:'#94a3b8',font:{size:10}},
          ticks:{color:'#22c55e',font:{size:10}},grid:{drawOnChartArea:false}},
      }
    }
  });

  // Source — 월 키가 정확히 있을 때만 해당 월, 그 외(range 포함)는 전체
  const src = SOURCES[curMo]||SOURCES.all;
  const maxV = Math.max(...src.map(s=>s[1]),1);
  const srcColors = ['#3b82f6','#94a3b8','#e1306c','#ff0000','#2563eb','#64748b'];
  document.getElementById('source-rows').innerHTML = src.map((s,i)=>`
    <div class="source-row">
      <div class="src-name">${L.srcName(s[0])}</div>
      <div class="src-bar-bg"><div class="src-bar" style="width:${(s[1]/maxV*100).toFixed(1)}%;background:${srcColors[i]}"></div></div>
      <div class="src-visits">${s[1]}</div>
      <div class="src-sales">${s[2]>0?fmt$(s[2]):''}</div>
    </div>`).join('');

  // LivePage table — 해당 키 데이터가 있을 때만 표시 (없으면 no-data, 전체 데이터 폴백 금지)
  const pages = LIVE_PAGES[curMo];
  let lpHtml;
  if(!pages){
    lpHtml = `<div class="no-data">${L.noData}</div>`;
  } else {
    const totalPageVisits = pages.reduce((s,p)=>s+p[2],0);
    lpHtml = `<table>
      <thead><tr>${L.thPages.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>
      ${pages.map(p=>{
        const cvr2 = p[2]>0?p[4]/p[2]:0;
        const pct  = totalPageVisits>0?p[2]/totalPageVisits:0;
        return `<tr ${p[3]>0?'class="row-hl"':''}>
          <td>${L.pageName(p[0])}</td>
          <td>${fmtI(p[1])}</td>
          <td>${fmtI(p[2])}</td>
          <td><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
            <div style="width:40px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden">
              <div style="width:${(pct*100).toFixed(1)}%;height:100%;background:#1d4ed8;border-radius:3px"></div>
            </div>
            <span>${fmtP(pct,0)}</span>
          </div></td>
          <td style="color:${p[3]>0?'#1d4ed8':'#94a3b8'};font-weight:${p[3]>0?700:400}">${p[3]>0?fmt$(p[3]):'—'}</td>
          <td>${p[4]>0?p[4]:'—'}</td>
          <td>${p[2]>0?fmtP(cvr2):'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
  }
  document.getElementById('livepage-area').innerHTML = lpHtml;

  // Comparison table
  const mos = ['2026-03','2026-04','2026-05'];
  document.getElementById('comp-tbody').innerHTML = mos.map(mo=>{
    const d   = agg(getRowsOf(mo));
    const pd  = agg(getRowsOf(PREV[mo]||'__'));
    const cvr2= d.visitors>0?(d.orders/d.visitors*100).toFixed(1)+'%':'—';
    const hl  = curMo===mo?'row-hl':'';
    const dlt = curMo===mo&&PREV[mo]?badge(delta(d.sales,pd.sales)):'';
    return `<tr class="${hl}">
      <td>${L.months[mo]}</td>
      <td>${fmt$(d.sales)} ${dlt}</td>
      <td>${d.orders}</td>
      <td>${d.visitors}</td>
      <td>${d.views}</td>
      <td>${cvr2}</td>
    </tr>`;
  }).join('');
}

renderStatic();
render();
</script>
</body>
</html>
